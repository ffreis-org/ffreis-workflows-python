name: Python Container Build

on:
  workflow_call:
    inputs:
      image-name:
        description: "Name (and optional tag) for the container image"
        type: string
        required: true
      containerfile:
        description: "Path to the Containerfile or Dockerfile"
        type: string
        default: "Containerfile"
      context:
        description: "Build context directory"
        type: string
        default: "."
      build-args:
        description: "Newline-separated build-arg pairs (KEY=VALUE)"
        type: string
        default: ""

jobs:
  container-build:
    name: Container Build
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Detect container engine
        id: engine
        run: |
          set -euo pipefail
          if command -v podman &>/dev/null; then
            echo "bin=podman" >> "$GITHUB_OUTPUT"
          elif command -v docker &>/dev/null; then
            echo "bin=docker" >> "$GITHUB_OUTPUT"
          else
            echo "Neither podman nor docker found in PATH" >&2
            exit 1
          fi

      - name: Build image
        env:
          ENGINE: ${{ steps.engine.outputs.bin }}
          CONTAINERFILE: ${{ inputs.containerfile }}
          IMAGE_NAME: ${{ inputs.image-name }}
          BUILD_ARGS_INPUT: ${{ inputs.build-args }}
          CONTEXT: ${{ inputs.context }}
        run: |
          set -euo pipefail
          BUILD_ARGS=()
          if [ -n "$BUILD_ARGS_INPUT" ]; then
            while IFS= read -r arg; do
              [ -z "$arg" ] && continue
              BUILD_ARGS+=(--build-arg "$arg")
            done <<< "$BUILD_ARGS_INPUT"
          fi
          "$ENGINE" build \
            -f "$CONTAINERFILE" \
            -t "$IMAGE_NAME" \
            "${BUILD_ARGS[@]+"${BUILD_ARGS[@]}"}" \
            "$CONTEXT"

      - name: Smoke test image
        env:
          ENGINE: ${{ steps.engine.outputs.bin }}
          IMAGE_NAME: ${{ inputs.image-name }}
        run: |
          set -euo pipefail
          "$ENGINE" run --rm "$IMAGE_NAME" --help \
            || "$ENGINE" run --rm "$IMAGE_NAME" true
