name: Python SonarCloud

on:
  workflow_call:
    inputs:
      python-version:
        description: "Python version to use"
        type: string
        default: "3.13"
      working-directory:
        description: "Directory to run steps in"
        type: string
        default: "."
      uv-extras:
        description: "uv extras to install (e.g. dev)"
        type: string
        default: "dev"
      uv-groups:
        description: "uv dependency-groups (PEP 735) to install (e.g. dev)"
        type: string
        default: ""
      sonar-project-key:
        description: "SonarCloud project key (defaults to repository name)"
        type: string
        default: ""
      sonar-organization:
        description: "SonarCloud organization slug"
        type: string
        default: ""
      coverage-command:
        description: "Command to generate coverage report (XML)"
        type: string
        default: "uv run pytest --cov=src --cov-report=xml tests/unit_tests"
      coverage-file:
        description: "Path to the coverage XML file"
        type: string
        default: "coverage.xml"
      coverage-artifact-name:
        description: "Name of a coverage artifact uploaded by python-coverage.yml (skips regeneration)"
        type: string
        default: ""
    secrets:
      SONAR_TOKEN:
        required: true

jobs:
  sonar:
    name: SonarCloud
    permissions:
      contents: read
    runs-on: ubuntu-latest
    if: vars.SONAR_ENABLED != 'false'

    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ inputs.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true

      - name: Install deps
        env:
          UV_EXTRAS: ${{ inputs.uv-extras }}
          UV_GROUPS: ${{ inputs.uv-groups }}
        run: |
          set -euo pipefail
          # Build per-extra/per-group flags from space-separated inputs so
          # "dev api grpc" becomes `--extra dev --extra api --extra grpc` (and
          # similarly for --group). Passing the whole string as one value
          # made uv reject it as invalid. Supports both legacy
          # [project.optional-dependencies] (extras) and PEP 735
          # [dependency-groups] (groups).
          extra_args=()
          for e in $UV_EXTRAS; do
            extra_args+=(--extra "$e")
          done
          for g in $UV_GROUPS; do
            extra_args+=(--group "$g")
          done
          uv sync --frozen "${extra_args[@]}"

      - name: Download coverage artifact
        if: inputs.coverage-artifact-name != ''
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: ${{ inputs.coverage-artifact-name }}
          path: ${{ inputs.working-directory }}

      - name: Generate coverage (if no artifact)
        if: inputs.coverage-artifact-name == ''
        env:
          COVERAGE_COMMAND: ${{ inputs.coverage-command }}
        run: |
          set -euo pipefail
          bash -lc "$COVERAGE_COMMAND"

      - name: Build Sonar extra args
        id: sonar-args
        env:
          PROJECT_KEY: ${{ inputs.sonar-project-key || vars.SONAR_PROJECT_KEY || format('{0}_{1}', github.repository_owner, github.event.repository.name) }}
          ORGANIZATION: ${{ inputs.sonar-organization || vars.SONAR_ORGANIZATION || github.repository_owner }}
        run: |
          set -euo pipefail
          if [[ -z "$PROJECT_KEY" && -f sonar-project.properties ]]; then
            PROJECT_KEY="$(grep -E '^sonar\\.projectKey=' sonar-project.properties | head -n 1 | cut -d= -f2- || true)"
          fi
          if [[ -z "$ORGANIZATION" && -f sonar-project.properties ]]; then
            ORGANIZATION="$(grep -E '^sonar\\.organization=' sonar-project.properties | head -n 1 | cut -d= -f2- || true)"
          fi
          PROJECT_KEY="${PROJECT_KEY,,}"
          ORGANIZATION="${ORGANIZATION,,}"

          EXTRA=""
          [ -n "$PROJECT_KEY" ] && EXTRA="$EXTRA -Dsonar.projectKey=$PROJECT_KEY"
          [ -n "$ORGANIZATION" ] && EXTRA="$EXTRA -Dsonar.organization=$ORGANIZATION"
          echo "args=$EXTRA" >> "$GITHUB_OUTPUT"

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@59db25f34e16620e48ab4bb9e4a5dce155cb5432 # nosemgrep: generic.secrets.security.detected-sonarqube-docs-api-key.detected-sonarqube-docs-api-key
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          projectBaseDir: ${{ inputs.working-directory }}
          args: >
            ${{ steps.sonar-args.outputs.args }}
            -Dsonar.python.coverage.reportPaths=${{ inputs.coverage-file }}
            -Dsonar.sources=src
            -Dsonar.tests=tests
            -Dsonar.python.version=${{ inputs.python-version }}
