name: Python Tests

on:
  workflow_call:
    inputs:
      python-version:
        description: "Python version to use"
        type: string
        default: "3.13"
      working-directory:
        description: "Directory to run steps in"
        type: string
        default: "."
      uv-extras:
        description: "uv extras to install (e.g. dev)"
        type: string
        default: "dev"
      uv-groups:
        description: "uv dependency-groups (PEP 735) to install (e.g. dev)"
        type: string
        default: ""
      test-dir:
        description: "Directory containing tests"
        type: string
        default: "tests/unit_tests"
      pytest-args:
        description: "Extra arguments passed to pytest"
        type: string
        default: "-q"
      timeout-minutes:
        description: "Job timeout in minutes"
        type: number
        default: 25
      run_on_draft:
        description: "Run even on draft PRs (default: skip on draft to save CI minutes)"
        required: false
        type: boolean
        default: false
      sibling-repos:
        description: "Space-separated sibling repos to clone before uv sync. Format: 'reponame' (clones to ../reponame) or 'reponame:relative-path' for non-standard paths."
        type: string
        default: ""
      coverage-min:
        description: "Minimum coverage percentage required (0 = no enforcement). Passed as --cov-fail-under to pytest."
        type: number
        default: 0
      runner:
        description: |
          JSON-encoded runner label(s). Default: GitHub-hosted ubuntu-latest.
          Self-hosted homelab box (private repos only): '["self-hosted","local"]'
        required: false
        type: string
        default: '["ubuntu-latest"]'

jobs:
  test:
    if: ${{ inputs.run_on_draft || vars.CI_RUN_ON_DRAFT == 'true' || github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    name: Pytest
    permissions:
      contents: read
    runs-on: ${{ fromJson(inputs.runner) }}
    timeout-minutes: ${{ inputs.timeout-minutes }}

    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ inputs.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true

      - name: Checkout sibling repos
        if: ${{ inputs.sibling-repos != '' }}
        env:
          SIBLING_REPOS: ${{ inputs.sibling-repos }}
        run: |
          set -euo pipefail
          for entry in $SIBLING_REPOS; do
            repo="${entry%%:*}"
            if [[ "$entry" == *:* ]]; then
              relpath="${entry#*:}"
              target="$GITHUB_WORKSPACE/$relpath"
            else
              target="$GITHUB_WORKSPACE/../$repo"
            fi
            mkdir -p "$(dirname "$target")"
            git clone --depth=1 "https://github.com/FelipeFuhr/${repo}.git" "$target"
          done

      - name: Assert uv.lock exists
        run: |
          set -euo pipefail
          test -s uv.lock || (echo "uv.lock missing — run uv lock"; exit 1)

      - name: Install deps (frozen)
        env:
          UV_EXTRAS: ${{ inputs.uv-extras }}
          UV_GROUPS: ${{ inputs.uv-groups }}
        run: |
          set -euo pipefail
          # Build per-extra/per-group flags from space-separated inputs so
          # "dev api grpc" becomes `--extra dev --extra api --extra grpc` (and
          # similarly for --group). Passing the whole string as one value
          # made uv reject it as invalid. Supports both legacy
          # [project.optional-dependencies] (extras) and PEP 735
          # [dependency-groups] (groups).
          extra_args=()
          for e in $UV_EXTRAS; do
            extra_args+=(--extra "$e")
          done
          for g in $UV_GROUPS; do
            extra_args+=(--group "$g")
          done
          uv sync --frozen "${extra_args[@]}"

      - name: Run tests
        env:
          PYTEST_ARGS: ${{ inputs.pytest-args }}
          TEST_DIR: ${{ inputs.test-dir }}
          COVERAGE_MIN: ${{ inputs.coverage-min }}
        run: |
          set -euo pipefail
          read -r -a pytest_args_arr <<< "$PYTEST_ARGS"
          cov_args=()
          if [[ "$COVERAGE_MIN" -gt 0 ]]; then
            cov_args+=(--cov --cov-fail-under="$COVERAGE_MIN")
          fi
          uv run --frozen pytest "${pytest_args_arr[@]}" "${cov_args[@]}" "$TEST_DIR"
