name: Python Coverage (Codecov)
# Uploads to Codecov when CODECOV_TOKEN is provided; when absent the upload
# step is attempted without a token (tokenless upload) and will not fail CI
# because fail_ci_if_error is false.

on:
  workflow_call:
    inputs:
      python-version:
        description: "Python version to use"
        type: string
        default: "3.13"
      working-directory:
        description: "Directory to run steps in"
        type: string
        default: "."
      uv-extras:
        description: "uv extras to install (e.g. dev)"
        type: string
        default: "dev"
      uv-groups:
        description: "uv dependency-groups (PEP 735) to install (e.g. dev)"
        type: string
        default: ""
      coverage-command:
        description: "Command to generate coverage report"
        type: string
        default: "uv run pytest --cov=src --cov-report=xml tests/unit_tests"
      coverage-file:
        description: "Path to the coverage XML file"
        type: string
        default: "coverage.xml"
      codecov-flags:
        description: "Codecov flags"
        type: string
        default: "unit"
      codecov-name:
        description: "Codecov report name"
        type: string
        default: "unit-coverage"
      run_on_draft:
        description: "Run even on draft PRs (default: skip on draft to save CI minutes)"
        required: false
        type: boolean
        default: false
      sibling-repos:
        description: "Space-separated sibling repos to clone before uv sync. Format: 'reponame' (clones to ../reponame) or 'reponame:relative-path' for non-standard paths."
        type: string
        default: ""
      runner:
        description: |
          JSON-encoded runner label(s). Default: GitHub-hosted ubuntu-latest.
          Self-hosted homelab box (private repos only): '["self-hosted","local"]'
        required: false
        type: string
        default: '["ubuntu-latest"]'
    secrets:
      CODECOV_TOKEN:
        required: false
      FLEET_READ_TOKEN:
        description: "Fleet-wide read PAT for cloning private sibling repos (optional; falls back to unauthenticated clone)."
        required: false

jobs:
  coverage:
    if: ${{ inputs.run_on_draft || vars.CI_RUN_ON_DRAFT == 'true' || github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    name: Unit Coverage
    permissions:
      contents: read
    runs-on: ${{ fromJson(inputs.runner) }}
    timeout-minutes: 30

    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ inputs.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true

      - name: Checkout sibling repos
        if: ${{ inputs.sibling-repos != '' }}
        env:
          SIBLING_REPOS: ${{ inputs.sibling-repos }}
          # scan-fix(org-migration): fleet repos moved FelipeFuhr -> ffreis-org;
          # sibling repos are private, so an unauthenticated clone 404s even
          # with the right org. FLEET_READ_TOKEN is the fleet-wide read PAT
          # (quality-kit/scripts/deploy-pats.sh); callers pass it via
          # `secrets: inherit`. Falls back to an unauthenticated clone (works
          # for public repos) when the secret isn't set.
          FLEET_READ_TOKEN: ${{ secrets.FLEET_READ_TOKEN }}
        run: |
          set -euo pipefail
          for entry in $SIBLING_REPOS; do
            repo="${entry%%:*}"
            if [[ "$entry" == *:* ]]; then
              relpath="${entry#*:}"
              target="$GITHUB_WORKSPACE/$relpath"
            else
              target="$GITHUB_WORKSPACE/../$repo"
            fi
            mkdir -p "$(dirname "$target")"
            if [[ -n "$FLEET_READ_TOKEN" ]]; then
              clone_url="https://x-access-token:${FLEET_READ_TOKEN}@github.com/ffreis-org/${repo}.git"
            else
              clone_url="https://github.com/ffreis-org/${repo}.git"
            fi
            git clone --depth=1 "$clone_url" "$target"
          done

      - name: Assert uv.lock exists
        run: |
          set -euo pipefail
          test -s uv.lock || (echo "uv.lock missing — run uv lock"; exit 1)

      - name: Install deps
        env:
          UV_EXTRAS: ${{ inputs.uv-extras }}
          UV_GROUPS: ${{ inputs.uv-groups }}
        run: |
          set -euo pipefail
          # Build per-extra/per-group flags from space-separated inputs so
          # "dev api grpc" becomes `--extra dev --extra api --extra grpc` (and
          # similarly for --group). Passing the whole string as one value
          # made uv reject it as invalid. Supports both legacy
          # [project.optional-dependencies] (extras) and PEP 735
          # [dependency-groups] (groups).
          extra_args=()
          for e in $UV_EXTRAS; do
            extra_args+=(--extra "$e")
          done
          for g in $UV_GROUPS; do
            extra_args+=(--group "$g")
          done
          uv sync --frozen "${extra_args[@]}"

      - name: Generate coverage report
        env:
          COVERAGE_COMMAND: ${{ inputs.coverage-command }}
          COVERAGE_REPORT_PATH: ${{ inputs.coverage-file }}
        run: |
          set -euo pipefail
          bash -lc "$COVERAGE_COMMAND"
          test -s "$COVERAGE_REPORT_PATH"

      - name: Upload coverage to Codecov
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false }}
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2
        with:
          files: ${{ inputs.coverage-file }}
          flags: ${{ inputs.codecov-flags }}
          name: ${{ inputs.codecov-name }}
          fail_ci_if_error: false
          verbose: true
          token: ${{ secrets.CODECOV_TOKEN }}
