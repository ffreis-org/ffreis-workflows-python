name: Python Security (pip-audit)

on:
  workflow_call:
    inputs:
      python-version:
        description: "Python version to use"
        type: string
        default: "3.13"
      working-directory:
        description: "Directory to run steps in"
        type: string
        default: "."
      fail-on-vuln:
        description: "Fail the workflow if vulnerabilities are found"
        type: boolean
        default: true
      ignore-vulns:
        description: "Comma-separated list of vulnerability IDs to ignore (e.g. CVE-2026-1234,CVE-2026-9999)"
        type: string
        default: ""
      run_on_draft:
        description: "Run even on draft PRs (default: skip on draft to save CI minutes)"
        required: false
        type: boolean
        default: false
      runner:
        description: |
          JSON-encoded runner label(s). Default: GitHub-hosted ubuntu-latest.
          Self-hosted homelab box (private repos only): '["self-hosted","local"]'
        required: false
        type: string
        default: '["ubuntu-latest"]'

jobs:
  deps-security:
    if: ${{ inputs.run_on_draft || vars.CI_RUN_ON_DRAFT == 'true' || github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    name: pip-audit
    permissions:
      contents: read
    runs-on: ${{ fromJson(inputs.runner) }}
    timeout-minutes: 30

    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ inputs.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true

      - name: Assert uv.lock exists
        run: |
          set -euo pipefail
          test -s uv.lock || (echo "uv.lock missing — run uv lock"; exit 1)

      - name: Install dependencies from lock
        run: |
          set -euo pipefail
          uv sync --frozen --no-build

      - name: pip-audit
        env:
          FAIL_ON_VULN: ${{ inputs.fail-on-vuln }}
          IGNORE_VULNS: ${{ inputs.ignore-vulns }}
        run: |
          set -euo pipefail
          ignore_args=()
          if [[ -n "$IGNORE_VULNS" ]]; then
            IFS=',' read -r -a ignore_arr <<< "$IGNORE_VULNS"
            for v in "${ignore_arr[@]}"; do
              v="${v#"${v%%[![:space:]]*}"}"
              v="${v%"${v##*[![:space:]]}"}"
              [[ -z "$v" ]] && continue
              ignore_args+=(--ignore-vuln "$v")
            done
          fi

          if [[ "$FAIL_ON_VULN" == "true" ]]; then
            uv run --frozen --with pip-audit pip-audit "${ignore_args[@]}"
          else
            uv run --frozen --with pip-audit pip-audit "${ignore_args[@]}" || true
          fi
