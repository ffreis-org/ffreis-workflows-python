name: Python Mutation Testing

# Reusable workflow — callers invoke via:
#   uses: ./.github/workflows/python-mutation.yml
#
# Intended schedule: weekly (Sunday 02:00 UTC) or workflow_dispatch.
# Do NOT run on every PR — mutation testing takes 5–30 min per repo.
#
# Exit behaviour:
#   - exit 0  → mutation score ≥ threshold   (pass)
#   - exit 1  → mutation score  < threshold  (fail CI)
#
# Requires: mutmut>=2.0 in the uv-extras group (e.g. dev).

on:
  workflow_call:
    inputs:
      python-version:
        description: "Python version to use"
        type: string
        default: "3.13"
      working-directory:
        description: "Directory to run steps in"
        type: string
        default: "."
      uv-extras:
        description: "uv extras group that contains mutmut (e.g. dev)"
        type: string
        default: "dev"
      uv-groups:
        description: "uv dependency groups to install (space-separated, e.g. 'dev docs')"
        type: string
        default: ""
      paths-to-mutate:
        description: "Source path(s) for mutmut to mutate (e.g. src/mypackage)"
        type: string
        default: "src"
      threshold:
        description: "Minimum mutation score (0–100). CI fails if score is below this."
        type: number
        default: 60
      timeout-minutes:
        description: "Total job timeout in minutes"
        type: number
        default: 60
      run_on_draft:
        description: "Run even on draft PRs (default: skip on draft to save CI minutes)"
        required: false
        type: boolean
        default: false
      sibling-repos:
        description: "Space-separated sibling repos to clone before uv sync. Format: 'reponame' (clones to ../reponame) or 'reponame:relative-path' for non-standard paths."
        type: string
        default: ""
    outputs:
      mutation-score:
        description: "Achieved mutation score (integer, 0–100)"
        value: ${{ jobs.mutation.outputs.score }}

jobs:
  mutation:
    if: ${{ inputs.run_on_draft || vars.CI_RUN_ON_DRAFT == 'true' || github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    name: Mutation score (mutmut)
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout-minutes }}
    outputs:
      score: ${{ steps.score.outputs.score }}

    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ inputs.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true

      - name: Checkout sibling repos
        if: ${{ inputs.sibling-repos != '' }}
        env:
          SIBLING_REPOS: ${{ inputs.sibling-repos }}
        run: |
          set -euo pipefail
          for entry in $SIBLING_REPOS; do
            repo="${entry%%:*}"
            if [[ "$entry" == *:* ]]; then
              relpath="${entry#*:}"
              target="$GITHUB_WORKSPACE/$relpath"
            else
              target="$GITHUB_WORKSPACE/../$repo"
            fi
            mkdir -p "$(dirname "$target")"
            git clone --depth=1 "https://github.com/FelipeFuhr/${repo}.git" "$target"
          done

      - name: Assert uv.lock exists
        run: |
          set -euo pipefail
          test -s uv.lock || (echo "uv.lock missing — run uv lock"; exit 1)

      - name: Install deps
        env:
          UV_EXTRAS: ${{ inputs.uv-extras }}
          UV_GROUPS: ${{ inputs.uv-groups }}
        run: |
          set -euo pipefail
          # Build per-extra/per-group flags from space-separated inputs so
          # "dev api grpc" becomes `--extra dev --extra api --extra grpc` (and
          # similarly for --group). Passing the whole string as one value
          # made uv reject it as invalid. Supports both legacy
          # [project.optional-dependencies] (extras) and PEP 735
          # [dependency-groups] (groups).
          extra_args=()
          for e in $UV_EXTRAS; do
            extra_args+=(--extra "$e")
          done
          for g in $UV_GROUPS; do
            extra_args+=(--group "$g")
          done
          uv sync --frozen "${extra_args[@]}"

      # Baseline run: verify tests pass before mutating anything.
      - name: Baseline test run
        run: |
          set -euo pipefail
          uv run --frozen --no-build pytest -q --tb=short 2>&1 | tail -10

      - name: Run mutation testing
        id: run
        env:
          PATHS_TO_MUTATE: ${{ inputs.paths-to-mutate }}
        run: |
          set -euo pipefail
          uv run --frozen --no-build mutmut run \
            --paths-to-mutate "$PATHS_TO_MUTATE" \
            || true   # mutmut exits 1 when mutants survive; score check is below

      - name: Compute score and enforce threshold
        id: score
        env:
          THRESHOLD: ${{ inputs.threshold }}
        run: |
          set -euo pipefail

          python3 - "$THRESHOLD" <<'EOF'
          import os, sqlite3, sys

          threshold = int(sys.argv[1])
          cache = ".mutmut-cache"

          if not os.path.exists(cache):
              print("::notice title=Mutation Score::No .mutmut-cache found — marking as passed.")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("score=100\n")
              sys.exit(0)

          conn = sqlite3.connect(cache)
          rows = dict(conn.execute(
              "SELECT status, COUNT(*) FROM mutant GROUP BY status"
          ).fetchall())
          conn.close()

          killed   = rows.get("ok_killed",    0)
          survived = rows.get("bad_survived", 0)
          timeout  = rows.get("bad_timeout",  0)

          total = killed + survived + timeout

          if total == 0:
              print("::notice title=Mutation Score::No viable mutants found — marking as passed.")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("score=100\n")
              sys.exit(0)

          score = killed * 100 // total
          print(f"Killed: {killed}  Survived: {survived}  Timeout: {timeout}  Total: {total}")
          print(f"Score: {score}%  Threshold: {threshold}%")

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"score={score}\n")

          if score < threshold:
              print(
                  f"::error title=Mutation Score Too Low::"
                  f"Score {score}% is below threshold {threshold}%. "
                  f"Killed {killed}/{total} mutants. "
                  f"Add tests that exercise more code paths."
              )
              sys.exit(1)
          else:
              print(
                  f"::notice title=Mutation Score OK::"
                  f"Score {score}% ≥ threshold {threshold}% ({killed}/{total} mutants killed)."
              )
          EOF

      - name: Upload mutmut cache
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: mutmut-report
          path: ${{ inputs.working-directory }}/.mutmut-cache
          retention-days: 14
          if-no-files-found: ignore
