name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]

# Validates that every workflow defined in this library functions correctly
# against the minimal example app in examples/hello/.
#
# python-sonar requires SONAR_TOKEN to be configured in the repository. The
# job is skipped on fork pull requests (secrets are not available to forks),
# but runs on all other events and fails if the token is absent.


concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci-local-coverage:
    permissions:
      contents: read
    uses: ffreis-org/ffreis-workflows-general/.github/workflows/general-ci-local-coverage.yml@12c41714d56ff512e8093cd96a2ab11e60aced17
    with:
      mode: defines
      enforce: true

  workflows-policy:
    permissions:
      contents: read
      actions: read
      security-events: write
    uses: ffreis-org/ffreis-workflows-general/.github/workflows/general-workflows-policy.yml@3858e9e74c805067e454740b195372c7195f333b # v1.5.0
  codeql-actions:
    permissions:
      contents: read
      actions: read
      security-events: write
    uses: ffreis-org/ffreis-workflows-general/.github/workflows/general-codeql.yml@3858e9e74c805067e454740b195372c7195f333b # v1.5.0
    with:
      languages: actions
      source-root: .
      upload-sarif: false

  fmt:
    permissions:
      contents: read
    uses: ./.github/workflows/python-fmt.yml
    with:
      working-directory: examples/hello

  lint:
    permissions:
      contents: read
    uses: ./.github/workflows/python-lint.yml
    with:
      working-directory: examples/hello

  test:
    permissions:
      contents: read
    uses: ./.github/workflows/python-test.yml
    with:
      working-directory: examples/hello

  build:
    permissions:
      contents: read
    uses: ./.github/workflows/python-build.yml
    with:
      working-directory: examples/hello

  lock-sync:
    permissions:
      contents: read
    uses: ./.github/workflows/python-lock-sync.yml
    with:
      working-directory: examples/hello

  security:
    permissions:
      contents: read
    uses: ./.github/workflows/python-security.yml
    with:
      working-directory: examples/hello
      fail-on-vuln: false

  semgrep:
    permissions:
      contents: read
    uses: ./.github/workflows/python-semgrep.yml
    with:
      working-directory: examples/hello

  hypothesis:
    permissions:
      contents: read
    uses: ./.github/workflows/python-hypothesis.yml
    with:
      working-directory: examples/hello
      test-dir: tests/hypothesis_tests

  coverage:
    permissions:
      contents: read
    uses: ./.github/workflows/python-coverage.yml
    with:
      working-directory: examples/hello
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  sonar:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false
    permissions:
      contents: read
    uses: ./.github/workflows/python-sonar.yml
    with:
      working-directory: examples/hello
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  docs:
    permissions:
      contents: read
    uses: ./.github/workflows/python-docs.yml
    with:
      working-directory: examples/hello

  bench:
    permissions:
      contents: read
    uses: ./.github/workflows/python-bench.yml
    with:
      working-directory: examples/hello

  mutation:
    permissions:
      contents: read
    uses: ./.github/workflows/python-mutation.yml
    with:
      working-directory: examples/hello
      paths-to-mutate: src
      threshold: 60

  container:
    permissions:
      contents: read
    uses: ./.github/workflows/python-container.yml
    with:
      image-name: hello-example
      context: examples/hello
      containerfile: examples/hello/Containerfile
