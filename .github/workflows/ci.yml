name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  actions: read
  security-events: write

# Validates that every workflow defined in this library functions correctly
# against the minimal example app in examples/hello/.
#
# python-sonar requires SONAR_TOKEN to be configured in the repository. The
# job is skipped on fork pull requests (secrets are not available to forks),
# but runs on all other events and fails if the token is absent.

jobs:
  env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  workflows-policy:
    permissions:
      contents: read
      actions: read
      security-events: write
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-workflows-policy.yml@9122525162705ed0676ed066e788f2e531a25bea # v1.0.0

  codeql-actions:
    permissions:
      contents: read
      actions: read
      security-events: write
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-codeql.yml@9122525162705ed0676ed066e788f2e531a25bea # v1.0.0
    with:
      languages: actions
      source-root: .
      upload-sarif: false

  fmt:
    permissions:
      contents: read
      actions: read
      security-events: write
    uses: FelipeFuhr/ffreis-workflows-python/.github/workflows/python-fmt.yml@main # NOSONAR: self-referential — pinning to a SHA creates a bootstrap cycle
    with:
      working-directory: examples/hello

  lint:
    permissions:
      contents: read
      actions: read
      security-events: write
    uses: FelipeFuhr/ffreis-workflows-python/.github/workflows/python-lint.yml@main # NOSONAR: self-referential — pinning to a SHA creates a bootstrap cycle
    with:
      working-directory: examples/hello

  test:
    permissions:
      contents: read
      actions: read
      security-events: write
    uses: FelipeFuhr/ffreis-workflows-python/.github/workflows/python-test.yml@main # NOSONAR: self-referential — pinning to a SHA creates a bootstrap cycle
    with:
      working-directory: examples/hello

  build:
    permissions:
      contents: read
      actions: read
      security-events: write
    uses: FelipeFuhr/ffreis-workflows-python/.github/workflows/python-build.yml@main # NOSONAR: self-referential — pinning to a SHA creates a bootstrap cycle
    with:
      working-directory: examples/hello

  lock-sync:
    permissions:
      contents: read
      actions: read
      security-events: write
    uses: FelipeFuhr/ffreis-workflows-python/.github/workflows/python-lock-sync.yml@main # NOSONAR: self-referential — pinning to a SHA creates a bootstrap cycle
    with:
      working-directory: examples/hello

  security:
    permissions:
      contents: read
      actions: read
      security-events: write
    uses: FelipeFuhr/ffreis-workflows-python/.github/workflows/python-security.yml@main # NOSONAR: self-referential — pinning to a SHA creates a bootstrap cycle
    with:
      working-directory: examples/hello
      fail-on-vuln: false

  semgrep:
    permissions:
      contents: read
      actions: read
      security-events: write
    uses: FelipeFuhr/ffreis-workflows-python/.github/workflows/python-semgrep.yml@main # NOSONAR: self-referential — pinning to a SHA creates a bootstrap cycle
    with:
      working-directory: examples/hello

  hypothesis:
    permissions:
      contents: read
      actions: read
      security-events: write
    uses: FelipeFuhr/ffreis-workflows-python/.github/workflows/python-hypothesis.yml@main # NOSONAR: self-referential — pinning to a SHA creates a bootstrap cycle
    with:
      working-directory: examples/hello
      test-dir: tests/hypothesis_tests

  coverage:
    permissions:
      contents: read
      actions: read
      security-events: write
    uses: FelipeFuhr/ffreis-workflows-python/.github/workflows/python-coverage.yml@main # NOSONAR: self-referential — pinning to a SHA creates a bootstrap cycle
    with:
      working-directory: examples/hello
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  sonar:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false
    permissions:
      contents: read
      actions: read
      security-events: write
    uses: FelipeFuhr/ffreis-workflows-python/.github/workflows/python-sonar.yml@main # NOSONAR: self-referential — pinning to a SHA creates a bootstrap cycle
    with:
      working-directory: examples/hello
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  docs:
    permissions:
      contents: read
      actions: read
      security-events: write
    uses: FelipeFuhr/ffreis-workflows-python/.github/workflows/python-docs.yml@main # NOSONAR: self-referential — pinning to a SHA creates a bootstrap cycle
    with:
      working-directory: examples/hello

  bench:
    permissions:
      contents: read
      actions: read
      security-events: write
    uses: FelipeFuhr/ffreis-workflows-python/.github/workflows/python-bench.yml@main # NOSONAR: self-referential — pinning to a SHA creates a bootstrap cycle
    with:
      working-directory: examples/hello

  mutation:
    permissions:
      contents: read
      actions: read
      security-events: write
    uses: FelipeFuhr/ffreis-workflows-python/.github/workflows/python-mutation.yml@main # NOSONAR: self-referential — pinning to a SHA creates a bootstrap cycle
    with:
      working-directory: examples/hello
      paths-to-mutate: src
      threshold: 60

  container:
    uses: FelipeFuhr/ffreis-workflows-python/.github/workflows/python-container.yml@main # NOSONAR: self-referential — pinning to a SHA creates a bootstrap cycle
    with:
      image-name: hello-example
      context: examples/hello
      containerfile: examples/hello/Containerfile
