name: DevOps / PR Labeler

on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened]

concurrency:
  group: devops-pr-labeler-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  labeler:
    permissions:
      contents: read
      pull-requests: write
      issues: write
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-labeler.yml@ef5f76c297dba0d2990210a905d045c826092427 # v1.4.3
    with:
      rules-json: |-
        [
          {"label":"ci","patterns":[".github/workflows/**",".github/actions/**"]},
          {"label":"python","patterns":["**/*.py","pyproject.toml","requirements*.txt","uv.lock","poetry.lock"]},
          {"label":"examples","patterns":["examples/**"]},
          {"label":"scripts","patterns":["scripts/**","Makefile","lefthook.yml"]},
          {"label":"docs","patterns":["**/*.md"]}
        ]
