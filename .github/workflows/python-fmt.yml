name: Python Format Check

on:
  workflow_call:
    inputs:
      python-version:
        description: "Python version to use"
        type: string
        default: "3.13"
      working-directory:
        description: "Directory to run steps in"
        type: string
        default: "."
      source-dirs:
        description: "Space-separated dirs to check"
        type: string
        default: "src tests"
      uv-extras:
        description: "uv extras to install (e.g. dev)"
        type: string
        default: "dev"
      uv-groups:
        description: "uv dependency-groups (PEP 735) to install (e.g. dev)"
        type: string
        default: ""
      run_on_draft:
        description: "Run even on draft PRs (default: skip on draft to save CI minutes)"
        required: false
        type: boolean
        default: false
      sibling-repos:
        description: "Space-separated sibling repos to clone before uv sync. Format: 'reponame' (clones to ../reponame) or 'reponame:relative-path' for non-standard paths."
        type: string
        default: ""
      runner:
        description: |
          JSON-encoded runner label(s). Default: GitHub-hosted ubuntu-latest.
        required: false
        type: string
        default: '["ubuntu-latest"]'

    secrets:
      FLEET_READ_TOKEN:
        description: "Fleet-wide read PAT for cloning private sibling repos (optional; falls back to unauthenticated clone)."
        required: false

jobs:
  fmt:
    if: ${{ inputs.run_on_draft || vars.CI_RUN_ON_DRAFT == 'true' || github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    name: Ruff Format Check
    permissions:
      contents: read
    runs-on: ${{ fromJson(inputs.runner) }}
    timeout-minutes: 30

    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ inputs.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true

      - name: Checkout sibling repos
        if: ${{ inputs.sibling-repos != '' }}
        env:
          SIBLING_REPOS: ${{ inputs.sibling-repos }}
          # scan-fix(org-migration): fleet repos moved FelipeFuhr -> ffreis-org;
          # sibling repos are private, so an unauthenticated clone 404s even
          # with the right org. FLEET_READ_TOKEN is the fleet-wide read PAT
          # (quality-kit/scripts/deploy-pats.sh); callers pass it via
          # `secrets: inherit`. Falls back to an unauthenticated clone (works
          # for public repos) when the secret isn't set.
          FLEET_READ_TOKEN: ${{ secrets.FLEET_READ_TOKEN }}
        run: |
          set -euo pipefail
          for entry in $SIBLING_REPOS; do
            repo="${entry%%:*}"
            if [[ "$entry" == *:* ]]; then
              relpath="${entry#*:}"
              target="$GITHUB_WORKSPACE/$relpath"
            else
              target="$GITHUB_WORKSPACE/../$repo"
            fi
            mkdir -p "$(dirname "$target")"
            # scan-fix(self-hosted-runner): self-hosted pods can reuse a
            # persistent _work directory across jobs of the same workflow run
            # (unlike ephemeral GitHub-hosted runners) — a prior job's sibling
            # clone left `$target` populated, and `git clone` refuses to clone
            # into a non-empty directory. Clear it first for idempotency.
            rm -rf "$target"
            if [[ -n "$FLEET_READ_TOKEN" ]]; then
              clone_url="https://x-access-token:${FLEET_READ_TOKEN}@github.com/ffreis-org/${repo}.git"
            else
              clone_url="https://github.com/ffreis-org/${repo}.git"
            fi
            git clone --depth=1 "$clone_url" "$target"
          done

      - name: Assert uv.lock exists
        run: |
          set -euo pipefail
          test -s uv.lock || (echo "uv.lock missing — run uv lock"; exit 1)

      - name: Install deps
        env:
          UV_EXTRAS: ${{ inputs.uv-extras }}
          UV_GROUPS: ${{ inputs.uv-groups }}
        run: |
          set -euo pipefail
          # Build per-extra/per-group flags from space-separated inputs so
          # "dev api grpc" becomes `--extra dev --extra api --extra grpc` (and
          # similarly for --group). Passing the whole string as one value
          # made uv reject it as invalid. Supports both legacy
          # [project.optional-dependencies] (extras) and PEP 735
          # [dependency-groups] (groups).
          extra_args=()
          for e in $UV_EXTRAS; do
            extra_args+=(--extra "$e")
          done
          for g in $UV_GROUPS; do
            extra_args+=(--group "$g")
          done
          uv sync --frozen "${extra_args[@]}"

      - name: Ruff format check
        env:
          SOURCE_DIRS: ${{ inputs.source-dirs }}
        run: |
          set -euo pipefail
          read -r -a source_dirs_arr <<< "$SOURCE_DIRS"
          uv run --frozen ruff format --check "${source_dirs_arr[@]}"
