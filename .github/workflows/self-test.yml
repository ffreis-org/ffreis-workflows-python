name: Self Test

on:
  push:
    branches: [main]

permissions:
  contents: read
  actions: read
  security-events: write

# Validates that every workflow defined in this library functions correctly
# against the minimal example app in examples/hello/.
#
# python-sonar requires SONAR_TOKEN to be configured in the repository. The
# job is skipped on fork pull requests (secrets are not available to forks),
# but runs on all other events and fails if the token is absent.

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workflows-policy:
    timeout-minutes: 30
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-workflows-policy.yml@01e2b12e992621fecf074b8a202f66044196f3bf # v1.0.4

  codeql-actions:
    timeout-minutes: 30
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-codeql.yml@01e2b12e992621fecf074b8a202f66044196f3bf # v1.0.4
    with:
      languages: actions
      source-root: .
      upload-sarif: false

  fmt:
    timeout-minutes: 30
    uses: ./.github/workflows/python-fmt.yml
    with:
      working-directory: examples/hello

  lint:
    timeout-minutes: 30
    uses: ./.github/workflows/python-lint.yml
    with:
      working-directory: examples/hello

  test:
    timeout-minutes: 30
    uses: ./.github/workflows/python-test.yml
    with:
      working-directory: examples/hello

  build:
    timeout-minutes: 30
    uses: ./.github/workflows/python-build.yml
    with:
      working-directory: examples/hello

  lock-sync:
    timeout-minutes: 30
    uses: ./.github/workflows/python-lock-sync.yml
    with:
      working-directory: examples/hello

  security:
    timeout-minutes: 30
    uses: ./.github/workflows/python-security.yml
    with:
      working-directory: examples/hello
      fail-on-vuln: false

  semgrep:
    timeout-minutes: 30
    uses: ./.github/workflows/python-semgrep.yml
    with:
      working-directory: examples/hello

  hypothesis:
    timeout-minutes: 30
    uses: ./.github/workflows/python-hypothesis.yml
    with:
      working-directory: examples/hello
      test-dir: tests/hypothesis_tests

  coverage:
    timeout-minutes: 30
    uses: ./.github/workflows/python-coverage.yml
    with:
      working-directory: examples/hello
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  sonar:
    timeout-minutes: 30
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false
    uses: ./.github/workflows/python-sonar.yml
    with:
      working-directory: examples/hello
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  docs:
    timeout-minutes: 30
    uses: ./.github/workflows/python-docs.yml
    with:
      working-directory: examples/hello

  bench:
    timeout-minutes: 30
    uses: ./.github/workflows/python-bench.yml
    with:
      working-directory: examples/hello

  mutation:
    timeout-minutes: 30
    uses: ./.github/workflows/python-mutation.yml
    with:
      working-directory: examples/hello
      paths-to-mutate: src
      threshold: 60

  container:
    timeout-minutes: 30
    uses: ./.github/workflows/python-container.yml
    with:
      image-name: hello-example
      context: examples/hello
      containerfile: examples/hello/Containerfile
