name: Python Build (Matrix)

on:
  workflow_call:
    inputs:
      python-versions:
        description: "JSON array of Python versions to test"
        type: string
        default: '["3.13","3.11","3.10"]'
      os-list:
        description: "JSON array of OS runners to test on"
        type: string
        default: '["ubuntu-latest","macos-latest"]'
      working-directory:
        description: "Directory to run steps in"
        type: string
        default: "."
      uv-extras:
        description: "uv extras to install (e.g. dev)"
        type: string
        default: "dev"
      test-dir:
        description: "Directory containing tests"
        type: string
        default: "tests/unit_tests"
      build-command:
        description: "Command to build the package"
        type: string
        default: "uv build"

permissions:
  contents: read

jobs:
  matrix-build:
    name: Build (${{ matrix.python }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 35

    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}

    strategy:
      fail-fast: false
      matrix:
        python: ${{ fromJson(inputs.python-versions) }}
        os: ${{ fromJson(inputs.os-list) }}

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python }}

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true

      - name: Assert uv.lock exists
        run: |
          set -euo pipefail
          test -s uv.lock || (echo "uv.lock missing — run uv lock"; exit 1)

      - name: Install deps (frozen)
        env:
          UV_EXTRAS: ${{ inputs.uv-extras }}
        run: |
          set -euo pipefail
          # Build per-extra flags so space-separated inputs like "dev api grpc"
          # become `--extra dev --extra api --extra grpc`. Passing the whole
          # string as one --extra value made uv reject it as invalid.
          extra_args=()
          for e in $UV_EXTRAS; do
            extra_args+=(--extra "$e")
          done
          uv sync --frozen "${extra_args[@]}"

      - name: Run tests
        env:
          TEST_DIR: ${{ inputs.test-dir }}
        run: |
          set -euo pipefail
          uv run --frozen pytest -q "$TEST_DIR"

      - name: Build package
        env:
          BUILD_COMMAND: ${{ inputs.build-command }}
        run: |
          set -euo pipefail
          bash -lc "$BUILD_COMMAND"
