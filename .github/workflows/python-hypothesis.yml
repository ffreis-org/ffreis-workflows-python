name: Python Hypothesis Tests

on:
  workflow_call:
    inputs:
      python-version:
        description: "Python version to use"
        type: string
        default: "3.13"
      working-directory:
        description: "Directory to run steps in"
        type: string
        default: "."
      uv-extras:
        description: "uv extras to install (e.g. dev)"
        type: string
        default: "dev"
      uv-groups:
        description: "uv dependency-groups (PEP 735) to install (e.g. dev)"
        type: string
        default: ""
      test-dir:
        description: "Directory containing hypothesis tests"
        type: string
        default: "tests/hypothesis_tests"
      timeout-minutes:
        description: "Job timeout in minutes"
        type: number
        default: 60
      hypothesis-profile:
        description: "Hypothesis profile to use"
        type: string
        default: "ci"
      run_on_draft:
        description: "Run even on draft PRs (default: skip on draft to save CI minutes)"
        required: false
        type: boolean
        default: false
      runner:
        description: |
          JSON-encoded runner label(s). Default: GitHub-hosted ubuntu-latest.
        required: false
        type: string
        default: '["ubuntu-latest"]'

jobs:
  hypothesis:
    if: ${{ inputs.run_on_draft || vars.CI_RUN_ON_DRAFT == 'true' || github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    name: Hypothesis Property Tests
    permissions:
      contents: read
    runs-on: ${{ fromJson(inputs.runner) }}
    timeout-minutes: ${{ inputs.timeout-minutes }}

    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ inputs.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true

      - name: Assert uv.lock exists
        run: |
          set -euo pipefail
          test -s uv.lock || (echo "uv.lock missing — run uv lock"; exit 1)

      - name: Install deps (frozen)
        env:
          UV_EXTRAS: ${{ inputs.uv-extras }}
          UV_GROUPS: ${{ inputs.uv-groups }}
        run: |
          set -euo pipefail
          # Build per-extra/per-group flags from space-separated inputs so
          # "dev api grpc" becomes `--extra dev --extra api --extra grpc` (and
          # similarly for --group). Passing the whole string as one value
          # made uv reject it as invalid. Supports both legacy
          # [project.optional-dependencies] (extras) and PEP 735
          # [dependency-groups] (groups).
          extra_args=()
          for e in $UV_EXTRAS; do
            extra_args+=(--extra "$e")
          done
          for g in $UV_GROUPS; do
            extra_args+=(--group "$g")
          done
          uv sync --frozen "${extra_args[@]}"

      - name: Run Hypothesis tests
        env:
          HYPOTHESIS_PROFILE: ${{ inputs.hypothesis-profile }}
          TEST_DIR: ${{ inputs.test-dir }}
        run: |
          set -euo pipefail
          # scan-fix(sonar:S8541): --no-build → --no-sync — --no-build refuses
          # to build the project's own editable distribution ("<pkg> @
          # editable+."), crashing every caller with a path-source/editable
          # local project ("marked as --no-build but has no binary
          # distribution" — see python-mutation.yml / PR #89 for the full
          # repro). The preceding "Install deps (frozen)" step already ran an
          # unrestricted `uv sync --frozen`, so the venv is already built and
          # lock-consistent; --no-sync makes `uv run` use it as-is with zero
          # install/build activity, preserving S8541's no-source-build intent
          # without touching the local project.
          uv run --frozen --no-sync pytest "$TEST_DIR"
