name: Python Hypothesis Tests

on:
  workflow_call:
    inputs:
      python-version:
        description: "Python version to use"
        type: string
        default: "3.13"
      working-directory:
        description: "Directory to run steps in"
        type: string
        default: "."
      uv-extras:
        description: "uv extras to install (e.g. dev)"
        type: string
        default: "dev"
      test-dir:
        description: "Directory containing hypothesis tests"
        type: string
        default: "tests/hypothesis_tests"
      timeout-minutes:
        description: "Job timeout in minutes"
        type: number
        default: 60
      hypothesis-profile:
        description: "Hypothesis profile to use"
        type: string
        default: "ci"

permissions:
  contents: read

jobs:
  hypothesis:
    name: Hypothesis Property Tests
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout-minutes }}

    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ inputs.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true

      - name: Assert uv.lock exists
        run: |
          set -euo pipefail
          test -s uv.lock || (echo "uv.lock missing — run uv lock"; exit 1)

      - name: Install deps (frozen)
        env:
          UV_EXTRAS: ${{ inputs.uv-extras }}
        run: |
          set -euo pipefail
          # Build per-extra flags so space-separated inputs like "dev api grpc"
          # become `--extra dev --extra api --extra grpc`. Passing the whole
          # string as one --extra value made uv reject it as invalid.
          extra_args=()
          for e in $UV_EXTRAS; do
            extra_args+=(--extra "$e")
          done
          uv sync --frozen "${extra_args[@]}"

      - name: Run Hypothesis tests
        env:
          HYPOTHESIS_PROFILE: ${{ inputs.hypothesis-profile }}
          TEST_DIR: ${{ inputs.test-dir }}
        run: |
          set -euo pipefail
          uv run --frozen pytest "$TEST_DIR"
