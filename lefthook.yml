remotes:
  - git_url: https://github.com/FelipeFuhr/ffreis-platform-standards
    ref: main
    configs:
      - lefthook/base.yml

# fmt-check targets examples/ only
pre-commit:
  commands:
    fmt-check:
      glob: "examples/**/*.py"
      run: make fmt-check

pre-push:
  parallel: false
  commands:
    lint:
      run: make lint
